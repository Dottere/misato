{{define "base"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="site-logo" href="/">Misato</a>
    <nav class="main-nav">
      <a href="/"      class="nav-link {{if eq .ActivePage "home"}}active{{end}}">Home</a>
      <a href="/comics" class="nav-link {{if eq .ActivePage "comics"}}active{{end}}">Comics</a>
    </nav>
  </header>

  <main class="page-content">
    {{block "content" .}}{{end}}
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Misato</p>
  </footer>
</body>
</html>
{{end}}
