{{template "base" .}} {{define "head"}}
<link rel="stylesheet" href="/static/css/reader.css" />
<script>
    window.CHAPTER_IMAGES = [
        {{range .Images}}
        "{{.}}",
        {{end}}
    ];
</script>
<script src="/static/js/reader.js" defer></script>
{{end}} {{define "content"}}
<section class="reader-mode">
    <div class="reader-header">
        <a href="/comics" class="btn-secondary" style="padding: 4px 12px"
            >← Back</a
        >
        <h1 class="reader-title">{{.Title}}</h1>

        <div class="page-jump-container">
            <input
                type="number"
                id="page-input"
                class="page-input"
                min="1"
                value="1"
                title="Jump to page"
            />
            <span id="page-total" class="page-total"> / Loading...</span>
        </div>
    </div>

    <div class="manga-container">
        <div
            class="click-zone zone-left"
            onclick="changePage(-1)"
            title="Previous Page"
        ></div>
        <div
            class="click-zone zone-right"
            onclick="changePage(1)"
            title="Next Page"
        ></div>
        <img id="manga-page" src="" alt="Comic Page" draggable="false" />
    </div>
</section>
{{end}}
